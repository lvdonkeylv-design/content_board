<!DOCTYPE html>

  <style>

    /* ===== 全局样式 (Global Styles) ===== */

    body {

      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;

      max-width: 820px;

      margin: 40px auto;

      padding: 0 24px;

      background: #f7f7f7;

      color: #333;

    }



    /* ===== 元信息栏 (Metadata Bar) ===== */

    .meta-bar {

      background: #fff;

      border: 1px solid #e0e0e0;

      border-radius: 8px;

      padding: 16px 20px;

      margin-bottom: 24px;

      font-size: 13px;

      color: #888;

    }

    .meta-bar h1 {

      font-size: 18px;

      color: #333;

      margin: 0 0 8px 0;

    }



    /* ===== 内容区域 (Content Area) ===== */

    #clipboard-content {

      background: #fff;

      border: 1px solid #e0e0e0;

      border-radius: 8px;

      padding: 24px;

      margin-bottom: 24px;

      overflow: hidden;

    }



    /* ===== 格式类型说明 (Format Classes) ===== */

    /* class="title"      — 大标题 (24px, 加粗, 居中) */

    /* class="body"       — 正文 (18px, 两端对齐) */

    /* class="empty-line" — 空行分隔 */

    /* class="hl" (span)  — 内联高亮 (绿色背景 + 加粗) */



    .title {

      font-size: 24px;

      font-weight: bold;

      text-align: center;

      margin: 16px 0;

    }

    .body {

      font-size: 18px;

      line-height: 2;

      letter-spacing: 1px;

      text-align: justify;

      margin: 4px 0;

    }

    .empty-line {

      height: 1em;

    }

    /* 内联高亮: 绿色背景 + 加粗, 用在 <span class="hl"> 里 */

    .hl {

      background-color: rgb(235, 252, 229);

      font-weight: bold;

    }



    /* ===== 纯文本预览 (Plain Text Preview) ===== */

    #plain-text-preview {

      background: #fafafa;

      border: 1px solid #eee;

      border-radius: 8px;

      padding: 16px 20px;

      margin-bottom: 24px;

      font-size: 14px;

      line-height: 1.8;

      white-space: pre-wrap;

      max-height: 400px;

      overflow-y: auto;

      color: #555;

    }

  </style>

</head>
